<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashboardComplete</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);

        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);
      }

      @theme {
        --radius-xs: calc(var(--radius) - 8px);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
        --radius-2xl: calc(var(--radius) + 8px);
        --radius-3xl: calc(var(--radius) + 16px);
        --radius-4xl: calc(var(--radius) + 24px);
      }

      * {
        corner-shape: var(--shape, round);
      }

      .rounded-full, .rounded-none,
      .rounded-t-full, .rounded-t-none,
      .rounded-r-full, .rounded-r-none,
      .rounded-b-full, .rounded-b-none,
      .rounded-l-full, .rounded-l-none,
      .rounded-s-full, .rounded-s-none,
      .rounded-e-full, .rounded-e-none,
      .rounded-tl-full, .rounded-tl-none,
      .rounded-tr-full, .rounded-tr-none,
      .rounded-bl-full, .rounded-bl-none,
      .rounded-br-full, .rounded-br-none,
      .rounded-ss-full, .rounded-ss-none,
      .rounded-se-full, .rounded-se-none,
      .rounded-es-full, .rounded-es-none,
      .rounded-ee-full, .rounded-ee-none {
        corner-shape: round;
      }

      @utility rounded-* {
        border-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-t-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-r-* {
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-b-* {
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-l-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-tl-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-tr-* {
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-bl-* {
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-br-* {
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-s-* {
        border-start-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-end-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-e-* {
        border-start-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-end-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-ss-* {
        border-start-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-se-* {
        border-start-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-es-* {
        border-end-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-ee-* {
        border-end-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }

      :root {
        --shape: squircle;
        --shape-multiplier: 1;

          --background: #090E17;
        --foreground: #E2E8F0;
        --primary: #d9a05b;
        --primary-foreground: #0a0a0a;
        --secondary: #151E2E;
        --secondary-foreground: #E2E8F0;
        --muted: #1E293B;
        --muted-foreground: #94A3B8;
        --accent: #D9A05B;
        --accent-foreground: #090E17;
        --destructive: #7F1D1D;
        --card: #131C2A;
        --card-foreground: #E2E8F0;
        --popover: #090E17;
        --popover-foreground: #E2E8F0;
        --border: #1E2A3B;
        --input: #131C2A;
        --ring: #E5AD4F;
        --chart-1: #e5ad4f;
        --chart-2: #60a5fa;
        --chart-3: #10b981;
        --chart-4: #6B502C;
        --chart-5: #362816;

        --font-sans: "Inter";
        --font-heading: "Playfair Display";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";

        --radius: 0.75rem;
      }

      @supports (corner-shape: squircle) {
        :root {
          --shape-multiplier: 2.5;
        }
      }

      /* Prevent layout shift for icons without explicit dimensions */
      iconify-icon:not([width]):not([height]) {
        display: inline-block;
        width: 1em;
        height: 1em;
      }

      /* Hide scrollbars */
      *,
      *::before,
      *::after {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="relative min-h-screen bg-background text-foreground overflow-hidden font-sans">
      <img
        alt="Golden particle background"
        src="https://ggrhecslgdflloszjkwl.supabase.co/storage/v1/object/public/user-assets/XYzUi4QdzmU/components/PhjhXJETUGs.png"
        class="absolute inset-0 w-[200%] h-[200%] -top-[50%] -left-[50%] object-cover opacity-[0.15] mix-blend-screen pointer-events-none animate-[spin_320s_linear_infinite]"
      />
      <div class="relative z-10 px-6 py-12 flex flex-col min-h-screen max-w-md mx-auto">
        <nav class="flex justify-between items-center mb-20">
          <div class="flex items-center gap-3 group">
            <div class="relative size-9 flex items-center justify-center">
              <div
                class="absolute inset-0 bg-accent/20 blur-md rounded-full group-hover:bg-accent/40 transition-colors duration-500"
              ></div>
              <div
                class="relative size-full border border-accent/30 rounded-full flex items-center justify-center backdrop-blur-sm shadow-[0_0_15px_rgba(217,160,91,0.2)] group-hover:border-accent/60 transition-all duration-500"
              >
                <iconify-icon
                  icon="ph:infinite-bold"
                  class="text-accent text-xl animate-[spin_10s_linear_infinite]"
                ></iconify-icon>
              </div>
            </div>
            <span
              class="font-heading font-bold text-xl tracking-[0.2em] uppercase bg-gradient-to-r from-foreground via-accent to-foreground bg-clip-text text-transparent group-hover:tracking-[0.25em] transition-all duration-700"
              >Storied</span
            >
          </div>
          <a
            href="screen-Settings"
            class="size-10 rounded-full overflow-hidden border border-accent/20 group relative"
            ><div
              class="absolute inset-0 bg-accent/20 blur-sm opacity-0 group-hover:opacity-100 transition-opacity"
            ></div>
            <img
              src="https://lh3.googleusercontent.com/a/ACg8ocJH4tH0LTrhEvb9LMMO7e6NnmM3adgJIN3F_OgyPFojeHwow63m=s96-c"
              alt="Orkun AYDIN"
              class="size-full object-cover group-hover:scale-110 transition-transform relative z-10"
          /></a>
        </nav>
        <div
          class="flex-1 flex flex-col items-center justify-center text-center space-y-12 animate-in fade-in duration-1000"
        >
          <div class="space-y-4">
            <p class="text-[10px] font-bold tracking-[0.4em] text-accent uppercase">
              Good evening, Orkun
            </p>
            <div class="space-y-1">
              <p class="text-xs tracking-widest text-muted-foreground uppercase">Day 4 of 30</p>
              <p class="text-xs tracking-widest text-accent uppercase font-bold">Day 3 Complete</p>
            </div>
          </div>
          <div class="py-10 border-y border-border/50 w-full">
            <h2 class="font-heading text-4xl mb-2 text-foreground">Day 4 is ready.</h2>
          </div>
          <a
            href="screen-Daily Question"
            class="w-full bg-gradient-to-r from-[#d9a05b] via-[#f5d0a0] to-[#d9a05b] bg-[length:200%_auto] animate-[shimmer_3s_linear_infinite] text-black font-bold py-5 rounded-2xl shadow-[0_15px_40px_rgba(217,160,91,0.2)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center"
            >Begin Day 4</a
          >
        </div>
        <div class="mt-auto pt-10 border-t border-border/30 flex justify-center">
          <div class="flex flex-col items-center gap-2">
            <span class="text-[10px] font-bold tracking-[0.3em] text-muted-foreground uppercase"
              >Streak: 3 Days</span
            >
            <div class="flex gap-1.5">
              <div
                class="size-1.5 rounded-full bg-accent shadow-[0_0_8px_rgba(229,173,79,0.5)]"
              ></div>
              <div
                class="size-1.5 rounded-full bg-accent shadow-[0_0_8px_rgba(229,173,79,0.5)]"
              ></div>
              <div
                class="size-1.5 rounded-full bg-accent shadow-[0_0_8px_rgba(229,173,79,0.5)]"
              ></div>
              <div class="size-1.5 rounded-full bg-muted/30"></div>
              <div class="size-1.5 rounded-full bg-muted/30"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

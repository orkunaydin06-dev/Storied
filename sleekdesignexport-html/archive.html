<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);

        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);
      }

      @theme {
        --radius-xs: calc(var(--radius) - 8px);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
        --radius-2xl: calc(var(--radius) + 8px);
        --radius-3xl: calc(var(--radius) + 16px);
        --radius-4xl: calc(var(--radius) + 24px);
      }

      * {
        corner-shape: var(--shape, round);
      }

      .rounded-full, .rounded-none,
      .rounded-t-full, .rounded-t-none,
      .rounded-r-full, .rounded-r-none,
      .rounded-b-full, .rounded-b-none,
      .rounded-l-full, .rounded-l-none,
      .rounded-s-full, .rounded-s-none,
      .rounded-e-full, .rounded-e-none,
      .rounded-tl-full, .rounded-tl-none,
      .rounded-tr-full, .rounded-tr-none,
      .rounded-bl-full, .rounded-bl-none,
      .rounded-br-full, .rounded-br-none,
      .rounded-ss-full, .rounded-ss-none,
      .rounded-se-full, .rounded-se-none,
      .rounded-es-full, .rounded-es-none,
      .rounded-ee-full, .rounded-ee-none {
        corner-shape: round;
      }

      @utility rounded-* {
        border-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-t-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-r-* {
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-b-* {
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-l-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-tl-* {
        border-top-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-tr-* {
        border-top-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-bl-* {
        border-bottom-left-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-br-* {
        border-bottom-right-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-s-* {
        border-start-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-end-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-e-* {
        border-start-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
        border-end-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-ss-* {
        border-start-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-se-* {
        border-start-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-es-* {
        border-end-start-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }
      @utility rounded-ee-* {
        border-end-end-radius: calc(--value(--radius-*, [length], [percentage]) * var(--shape-multiplier, 1));
      }

      :root {
        --shape: squircle;
        --shape-multiplier: 1;

          --background: #090E17;
        --foreground: #E2E8F0;
        --primary: #d9a05b;
        --primary-foreground: #0a0a0a;
        --secondary: #151E2E;
        --secondary-foreground: #E2E8F0;
        --muted: #1E293B;
        --muted-foreground: #94A3B8;
        --accent: #D9A05B;
        --accent-foreground: #090E17;
        --destructive: #7F1D1D;
        --card: #131C2A;
        --card-foreground: #E2E8F0;
        --popover: #090E17;
        --popover-foreground: #E2E8F0;
        --border: #1E2A3B;
        --input: #131C2A;
        --ring: #E5AD4F;
        --chart-1: #e5ad4f;
        --chart-2: #60a5fa;
        --chart-3: #10b981;
        --chart-4: #6B502C;
        --chart-5: #362816;

        --font-sans: "Inter";
        --font-heading: "Playfair Display";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";

        --radius: 0.75rem;
      }

      @supports (corner-shape: squircle) {
        :root {
          --shape-multiplier: 2.5;
        }
      }

      /* Prevent layout shift for icons without explicit dimensions */
      iconify-icon:not([width]):not([height]) {
        display: inline-block;
        width: 1em;
        height: 1em;
      }

      /* Hide scrollbars */
      *,
      *::before,
      *::after {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div
      class="relative min-h-screen bg-background text-foreground overflow-hidden font-sans pb-24"
    >
      <img
        alt="Golden particle background"
        src="https://ggrhecslgdflloszjkwl.supabase.co/storage/v1/object/public/user-assets/XYzUi4QdzmU/components/PhjhXJETUGs.png"
        class="absolute inset-0 w-[200%] h-[200%] -top-[50%] -left-[50%] object-cover opacity-[0.1] mix-blend-screen pointer-events-none animate-[spin_400s_linear_infinite]"
      />
      <div class="relative z-10 px-6 py-12 max-w-md mx-auto">
        <header class="flex justify-between items-center mb-12">
          <a
            href="screen-Settings"
            class="size-10 flex items-center justify-center bg-card rounded-full border border-border hover:bg-muted/20 active:scale-90 transition-all"
            ><iconify-icon icon="ph:arrow-left" class="text-xl"></iconify-icon
          ></a>
          <div class="flex flex-col items-center gap-0.5">
            <iconify-icon
              icon="ph:infinite-bold"
              class="text-accent text-[10px] opacity-60"
            ></iconify-icon
            ><span class="text-[10px] font-bold tracking-[0.2em] text-muted-foreground uppercase"
              >Archive</span
            >
          </div>
          <div class="size-10"></div>
        </header>
        <div class="space-y-2 mb-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
          <h1 class="font-heading text-4xl">Your recordings</h1>
          <p class="text-muted-foreground">Private. Yours. Always.</p>
        </div>
        <div class="space-y-4 mb-12 animate-in fade-in slide-in-from-bottom-6 duration-1000">
          <div
            class="p-6 rounded-2xl bg-card/40 border border-border flex justify-between items-center group hover:bg-card hover:border-accent/30 transition-all cursor-pointer"
          >
            <div class="space-y-1">
              <span class="text-[10px] font-bold tracking-widest text-muted-foreground uppercase"
                >Day 1</span
              >
              <div class="font-medium text-lg">
                R1: <span class="text-muted-foreground">45</span> → R2:
                <span class="text-accent">57</span>
              </div>
            </div>
            <button class="text-accent text-sm font-medium group-hover:underline">
              View feedback
            </button>
          </div>
          <div
            class="p-6 rounded-2xl bg-card/40 border border-border flex justify-between items-center group hover:bg-card hover:border-accent/30 transition-all cursor-pointer"
          >
            <div class="space-y-1">
              <span class="text-[10px] font-bold tracking-widest text-muted-foreground uppercase"
                >Day 2</span
              >
              <div class="font-medium text-lg">
                R1: <span class="text-muted-foreground">52</span> → R2:
                <span class="text-accent">65</span>
              </div>
            </div>
            <button class="text-accent text-sm font-medium group-hover:underline">
              View feedback
            </button>
          </div>
          <div
            class="p-6 rounded-2xl bg-card/40 border border-border flex justify-between items-center group hover:bg-card hover:border-accent/30 transition-all cursor-pointer"
          >
            <div class="space-y-1">
              <span class="text-[10px] font-bold tracking-widest text-muted-foreground uppercase"
                >Day 3</span
              >
              <div class="font-medium text-lg">
                R1: <span class="text-muted-foreground">61</span> → R2:
                <span class="text-accent">74</span>
              </div>
            </div>
            <button class="text-accent text-sm font-medium group-hover:underline">
              View feedback
            </button>
          </div>
        </div>
        <div
          class="space-y-6 pt-8 border-t border-border animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-300"
        >
          <button
            class="flex items-center gap-3 text-muted-foreground hover:text-foreground transition-colors group"
          >
            <iconify-icon
              icon="ph:file-zip"
              class="text-xl group-hover:text-accent transition-colors"
            ></iconify-icon
            ><span class="text-sm font-medium">Export all recordings (ZIP)</span></button
          ><button
            class="flex items-center gap-3 text-destructive/70 hover:text-destructive transition-colors group"
          >
            <iconify-icon icon="ph:trash" class="text-xl"></iconify-icon
            ><span class="text-sm font-medium">Delete everything</span>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
